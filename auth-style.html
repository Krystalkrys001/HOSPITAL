<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - KRYSTAL KRONA CARE</title>
    <link rel="stylesheet" href="auth-styles.css">
</head>
<body>

    <div class="admin-login-container">
        <div class="admin-logo">
            <img src="https://placehold.co/100x100/png?text=KKC+Logo&font=playfair+display&bg=0066cc&textColor=FFFFFF" alt="KRYSTAL KRONA CARE">
        </div>

        <div class="admin-shield">🛡️</div>

        <h1 class="admin-title">Admin Access</h1>
        <p class="admin-subtitle">KRYSTAL KRONA CARE Dashboard</p>

        <div class="error-message" id="errorMessage">
            Invalid credentials. Please try again.
        </div>

        <form id="adminLoginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter admin username" autocomplete="username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter admin password" autocomplete="current-password" required>
            </div>

            <a href="admin-dashboard.html"></a><button type="submit" class="btn-admin-login">
                🔓 Login to Dashboard
            </button>
        </form>

        <div class="back-home">
            <a href= "manus.html">← Back to Website</a>
        </div>

        <div class="security-note">
            🔒 This is a secure admin area. All access attempts are logged.
        </div>
    </div>

    <script>
        // ============================================
        // ADMIN AUTHENTICATION WITH BACKEND INTEGRATION
        // ============================================

        const loginForm = document.getElementById('adminLoginForm');
        const errorMessage = document.getElementById('errorMessage');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');

        // Handle login with backend API
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password }),
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Login failed');
                }

                // Store token in localStorage
                localStorage.setItem('admin_token', data.token);

                // Show success and redirect
                errorMessage.style.display = 'none';
                alert('✅ Login successful! Redirecting to dashboard...');
                
                setTimeout(() => {
                    window.location.href = 'admin-dashboard.html';
                }, 500);
            } catch (error) {
                // Show error
                errorMessage.textContent = error.message;
                errorMessage.classList.add('show');
                passwordInput.value = '';
                passwordInput.focus();

                setTimeout(() => {
                    errorMessage.classList.remove('show');
                }, 3000);
            }
        });

        // Auto-focus username on load
        window.addEventListener('load', () => {
            usernameInput.focus();
        });

        // Check if already logged in
        if (localStorage.getItem('admin_token')) {
            // Verify token with backend
            fetch('/api/admin/verify', {
                headers: {
                    'Authorization': `Bearer ${localStorage.getItem('admin_token')}`
                }
            }).then(response => {
                if (response.ok) {
                    window.location.href = 'admin-dashboard.html';
                } else {
                    localStorage.removeItem('admin_token');
                }
            });
        }
    </script>

</body>
</html>
